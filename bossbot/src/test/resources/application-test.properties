# Test profile - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable Liquibase for tests (using H2 with create-drop)
spring.liquibase.enabled=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT Configuration for tests
jwt.secret=testSecretKeyForJwtTokenGenerationInTestEnvironmentMustBeLongEnough
jwt.expiration=3600000

# CORS Configuration for tests
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# OAuth Configuration for tests
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# OpenAI Configuration for tests (using mock)
openai.api-key=mock-api-key-for-testing
