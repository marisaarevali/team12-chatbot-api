# Local development profile - uses localhost Postgres
# Database configuration comes from environment variables (.env file)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# OpenAI
openai.api-key=${OPENAI_API_KEY:mock}

# Run migrations with dev and local contexts (includes test data)
spring.liquibase.contexts=dev,local

# Set true for local development only - disables security (no Google login needed) to simplify testing
app.security.permit-all=true

# JWT settings
# 5h
jwt.expiration.milliseconds=18000000

# Uncomment, if localhost Google login fails on local dev:
# app.cookie.secure=false
